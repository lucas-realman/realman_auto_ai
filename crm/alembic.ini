# Alembic Configuration File
# Sirus AI-CRM 数据库迁移配置

[alembic]
# 迁移脚本路径
script_location = crm/alembic

# 迁移文件名模板（带日期前缀）
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# sys.path 前置路径，确保可以 import crm 包
prepend_sys_path = .

# 数据库 URL — 优先由 env.py 从 crm.config.settings 动态注入
# 此处仅作为 fallback
sqlalchemy.url = postgresql+asyncpg://ai_crm:ai_crm_2026@172.16.12.50:5432/ai_crm

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
