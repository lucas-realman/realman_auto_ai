# ============================================================
# Sirus AI CRM — Nginx 主配置
# 运行位置: gateway 节点 (W3)
# 用途: 统一入口，反向代理 CRM 后端 + Agent 引擎
#
# 契约依据:
#   - contracts/crm-api.yaml   → CRM 后端 172.16.12.50:8900
#   - contracts/agent-api.yaml → Agent 引擎 172.16.11.194:8100
#   - contracts/health-api.yaml → 健康检查
# ============================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 日志格式 ──
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # ── 基础优化 ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 20m;

    # ── Gzip 压缩 ──
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ============================================================
    # 上游服务器定义
    # ============================================================

    # CRM 后端 — mac_min_8T (contracts/crm-api.yaml)
    upstream crm_backend {
        server 172.16.12.50:8900 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Agent 引擎 — 4090 (contracts/agent-api.yaml)
    upstream agent_engine {
        server 172.16.11.194:8100 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ============================================================
    # 默认服务器
    # ============================================================
    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  _;

        # ── Nginx 自身健康检查 ──
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"nginx"}';
        }

        # ────────────────────────────────────────────────────────
        # CRM API 代理  →  crm_backend (172.16.12.50:8900)
        # 路径: /api/*
        # ────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://crm_backend;
            proxy_http_version 1.1;

            # 保留原始请求信息
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";

            # 超时设置
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # 缓冲
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;

            # 错误处理
            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;
        }

        # ────────────────────────────────────────────────────────
        # Agent SSE 流式专用路由 (必须在 /agent/ 之前匹配)
        # contracts/agent-api.yaml: POST /agent/chat/stream
        # ────────────────────────────────────────────────────────
        location /agent/chat/stream {
            proxy_pass         http://agent_engine;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";

            # SSE 流式: 禁用缓冲和缓存
            proxy_buffering         off;
            proxy_cache             off;
            chunked_transfer_encoding on;

            # SSE 长连接超时 — 比普通 Agent 路由更长
            proxy_connect_timeout  10s;
            proxy_send_timeout     300s;
            proxy_read_timeout     300s;

            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;
        }

        # ────────────────────────────────────────────────────────
        # Agent 引擎代理  →  agent_engine (172.16.11.194:8100)
        # 路径: /agent/*
        # ────────────────────────────────────────────────────────
        location /agent/ {
            proxy_pass         http://agent_engine;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";

            # SSE 支持: 禁用缓冲和缓存
            proxy_buffering off;
            proxy_cache     off;

            # 超时设置 — 推理耗时较长，比 CRM API 更大
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;
        }

        # ────────────────────────────────────────────────────────
        # 钉钉回调预留位置
        # ────────────────────────────────────────────────────────
        location /dingtalk/ {
            # 预留给钉钉机器人消息回调，Sprint 1-2 Day 3 实现
            return 501 '{"error":"not_implemented","message":"dingtalk callback pending"}';
            default_type application/json;
        }

        # ── 错误页面 ──
        error_page 404             /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        # ── 默认: 拒绝未匹配路径 ──
        location / {
            return 404 '{"error":"not_found"}';
            default_type application/json;
        }
    }

    # ── 加载子配置 ──
    include /etc/nginx/conf.d/*.conf;
}
