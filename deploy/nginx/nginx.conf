# ============================================================
# Sirus AI CRM — Nginx 基础配置
# 运行位置: gateway 节点
# 功能: 反向代理，将请求路由到 CRM 后端和 Agent 引擎
# 契约依据: contracts/crm-api.yaml, contracts/agent-api.yaml
# ============================================================

# ── 工作进程 ──
worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # ── 基础设置 ──
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log  /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # ── gzip 压缩 ──
    gzip  on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── 上游服务定义 ──
    # CRM 后端 (mac_min_8T)
    # 契约: contracts/crm-api.yaml — http://172.16.12.50:8900
    upstream crm_backend {
        server 172.16.12.50:8900;
        keepalive 16;
    }

    # Agent 引擎 (4090)
    # 契约: contracts/agent-api.yaml — http://172.16.11.194:8100
    upstream agent_engine {
        server 172.16.11.194:8100;
        keepalive 16;
    }

    # ── 主 server 块 ──
    server {
        listen       80;
        server_name  _;

        # ── 健康检查 (网关自身) ──
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"gateway"}';
        }

        # ── CRM 后端 API ──
        # 路由: /api/v1/leads, /api/v1/customers, /api/v1/opportunities,
        #        /api/v1/activities, /api/v1/analytics/*, /api/v1/dashboard
        location /api/ {
            proxy_pass         http://crm_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # 超时设置
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # ── Agent 引擎 ──
        # 路由: /agent/chat, /agent/chat/stream, /agent/evaluate
        location /agent/ {
            proxy_pass         http://agent_engine;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Agent 推理可能较慢，延长超时
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_send_timeout    30s;

            # SSE 流式输出支持 (contracts/agent-api.yaml: /agent/chat/stream)
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;
        }

        # ── 钉钉回调 (预留) ──
        location /dingtalk/ {
            proxy_pass         http://crm_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # ── 前端静态文件 (预留，Sprint 7-8 启用) ──
        # location / {
        #     root   /usr/share/nginx/html;
        #     index  index.html;
        #     try_files $uri $uri/ /index.html;
        # }

        # ── 默认返回 404 ──
        location / {
            default_type application/json;
            return 404 '{"error":"not_found","message":"No route matched"}';
        }
    }
}
