# ============================================================
# Sirus AI CRM — Nginx 基础配置
# 运行位置: gateway 网关机
# 契约依据: contracts/crm-api.yaml, contracts/agent-api.yaml
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    gzip  on;
    gzip_types text/plain text/css application/json application/javascript;

    # CRM 后端 (mac_min_8T)
    upstream crm_backend {
        server 172.16.12.50:8900;
        keepalive 32;
    }

    # Agent 引擎 (4090)
    upstream agent_engine {
        server 172.16.11.194:8100;
        keepalive 16;
    }

    server {
        listen       80;
        server_name  _;

        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # CRM 后端 API
        location /api/ {
            proxy_pass         http://crm_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }

        # Agent 引擎
        location /agent/ {
            proxy_pass         http://agent_engine;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            proxy_connect_timeout  10s;
            proxy_send_timeout     120s;
            proxy_read_timeout     120s;
        }

        # 钉钉回调
        location /dingtalk/ {
            proxy_pass         http://agent_engine;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }

        # 前端静态文件 (预留)
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
