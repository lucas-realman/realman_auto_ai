# ============================================================
# Sirus AI CRM — Nginx 基础配置
# 运行位置: gateway 网关机
# 契约依据: contracts/crm-api.yaml, contracts/agent-api.yaml
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript;

    # CRM 后端 (mac_min_8T)
    upstream crm_backend {
        server 172.16.12.50:8900;
        keepalive 32;
    }

    # Agent 引擎 (4090)
    upstream agent_engine {
        server 172.16.11.194:8100;
        keepalive 32;
    }

    server {
        listen       80;
        server_name  _;

        # ──────── Nginx 自身健康检查 ────────
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"nginx"}';
        }

        # ──────── CRM 后端 API (contracts/crm-api.yaml) ────────
        location /api/ {
            proxy_pass         http://crm_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }

        # ──────── Agent 引擎 (contracts/agent-api.yaml) ────────
        location /agent/ {
            proxy_pass         http://agent_engine;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            # SSE 流式输出: 禁用缓冲和缓存
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;
            proxy_connect_timeout  10s;
            proxy_send_timeout     120s;
            proxy_read_timeout     120s;
        }

        # ──────── Agent SSE 流式专用路由 (更长超时) ────────
        location = /agent/chat/stream {
            proxy_pass         http://agent_engine/agent/chat/stream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;
            proxy_connect_timeout  10s;
            proxy_send_timeout     300s;
            proxy_read_timeout     300s;
        }

        # ──────── 钉钉回调 ────────
        location /dingtalk/ {
            proxy_pass         http://agent_engine;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }

        # ──────── 前端静态文件 (预留 Vue3 SPA) ────────
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # ──────── 上游不可达错误页 ────────
        error_page 502 503 504 /upstream_error.json;
        location = /upstream_error.json {
            internal;
            default_type application/json;
            return 502 '{"error":"upstream_unavailable","message":"后端服务暂时不可用，请稍后重试"}';
        }
    }
}
