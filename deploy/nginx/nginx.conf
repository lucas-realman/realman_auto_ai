# ============================================================
# Sirus AI CRM — Nginx 反向代理基础配置
# 运行位置: gateway (W3)
# 说明:
#   - /api/*   → CRM 后端 (mac_min_8T 172.16.12.50:8900)
#   - /agent/* → Agent 引擎 (4090 172.16.11.194:8100)
#   - /health  → 网关自身健康检查
#   - 预留 SSL、限流、钉钉回调位置（后续 Sprint 完善）
# ============================================================

worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 日志格式 ──
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip 压缩 ──
    gzip  on;
    gzip_types  text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── 上游服务定义 ──────────────────────────────────────
    # CRM 后端 (mac_min_8T)
    upstream crm_backend {
        server 172.16.12.50:8900;
        keepalive 16;
    }

    # Agent 引擎 (4090)
    upstream agent_engine {
        server 172.16.11.194:8100;
        keepalive 16;
    }

    # ── 主 Server ─────────────────────────────────────────
    server {
        listen       80;
        server_name  _;

        # ── 网关自身健康检查 ──
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"gateway"}';
        }

        # ── CRM 后端 API (/api/*) ──
        # 契约: crm-api.yaml — http://172.16.12.50:8900
        location /api/ {
            proxy_pass         http://crm_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # 超时设置
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;

            # 请求体大小限制
            client_max_body_size   10m;
        }

        # ── Agent 引擎 (/agent/*) ──
        # 契约: agent-api.yaml — http://172.16.11.194:8100
        location /agent/ {
            proxy_pass         http://agent_engine;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Agent 推理可能较慢，给更长的超时
            proxy_connect_timeout  10s;
            proxy_send_timeout     120s;
            proxy_read_timeout     120s;

            # 请求体大小限制
            client_max_body_size   2m;
        }

        # ── Agent 流式 SSE 端点 ──
        # 契约: agent-api.yaml — POST /agent/chat/stream (text/event-stream)
        location = /agent/chat/stream {
            proxy_pass         http://agent_engine;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # SSE 关键配置：禁用缓冲，实时推送
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;

            # SSE 连接可能持续较长时间
            proxy_connect_timeout  10s;
            proxy_send_timeout     300s;
            proxy_read_timeout     300s;

            client_max_body_size   2m;
        }

        # ── 预留: 钉钉回调 (Sprint 1-2 Day 3 完善) ──
        # location /dingtalk/callback {
        #     proxy_pass http://crm_backend;
        # }

        # ── 预留: 前端静态文件 (Sprint 7-8 完善) ──
        # location / {
        #     root   /usr/share/nginx/html;
        #     index  index.html;
        #     try_files $uri $uri/ /index.html;
        # }

        # ── 预留: SSL 配置 (Sprint 7-8 Day 1) ──
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/ssl/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/key.pem;

        # ── 预留: 限流 (Sprint 7-8 Day 2) ──
        # limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
        # limit_req_zone $binary_remote_addr zone=agent:10m rate=30r/m;
    }
}
