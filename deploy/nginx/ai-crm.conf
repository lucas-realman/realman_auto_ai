# ============================================================
# Sirus AI CRM — Nginx 反向代理配置
# 运行位置: gateway (172.16.14.215)
# 监听: 80 端口
# ============================================================

# WebSocket Upgrade 映射
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream crm_backend {
    server 172.16.12.50:8900;
    keepalive 32;
}

upstream agent_engine {
    server 172.16.11.194:8100;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── 日志 ──
    access_log /var/log/nginx/ai-crm-access.log;
    error_log  /var/log/nginx/ai-crm-error.log warn;

    # ── 安全 Headers ──
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── 通用代理设置 ──
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;

    # ── CRM 后端 API ──
    location /api/ {
        proxy_pass http://crm_backend/api/;
    }

    # ── Agent 引擎 ──
    # 支持 SSE 流式响应 + WebSocket
    location /agent/ {
        proxy_pass http://agent_engine/agent/;

        # SSE / 流式支持
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # WebSocket 支持
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── 健康检查: CRM ──
    location = /health/crm {
        proxy_pass http://crm_backend/health;
    }

    # ── 健康检查: Agent ──
    location = /health/agent {
        proxy_pass http://agent_engine/health;
    }

    # ── 默认返回 ──
    location / {
        return 200 '{"service": "sirus-ai-crm-gateway", "status": "ok"}';
        add_header Content-Type application/json;
    }
}

