# ============================================================
# Sirus AI CRM — CRM 后端代理规则
# 路由: /api/* → crm_backend (172.16.12.50:8900)
# 契约: contracts/crm-api.yaml
# ============================================================

server {
    listen       80;
    server_name  _;

    # ── 健康检查 ──
    location = /health {
        proxy_pass http://crm_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── CRM REST API ──
    # 线索 /api/v1/leads
    # 客户 /api/v1/customers
    # 商机 /api/v1/opportunities
    # 活动 /api/v1/activities
    # 统计 /api/v1/analytics/*
    # 仪表盘 /api/v1/dashboard
    location /api/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # 保持长连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Agent 引擎 ──
    # 对话 /agent/chat
    # 流式 /agent/chat/stream
    # 评估 /agent/evaluate
    location /agent/ {
        proxy_pass http://agent_engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # SSE 流式输出支持 —— 禁用缓冲
        proxy_buffering off;
        proxy_cache off;

        # Agent 推理可能较慢，延长超时
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # 保持长连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── 钉钉回调（预留） ──
    location /dingtalk/callback {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    # ── 前端静态文件（预留，Sprint 7-8 启用） ──
    # location / {
    #     root /usr/share/nginx/html;
    #     index index.html;
    #     try_files $uri $uri/ /index.html;
    # }

    # ── 默认返回 ──
    location / {
        return 200 '{"service": "sirus-ai-crm", "status": "ok"}';
        add_header Content-Type application/json;
    }
}
